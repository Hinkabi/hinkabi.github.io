<html lang="en">
    <head>
        
        <title>Contact Us</title>
        <!-- Bootstrap CDN copied from https://getbootstrap.com/docs/4.1/getting-started/introduction/ -->

        <link href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="restaurantstyles.css" type="text/css">

        <style>
            body {text-align: center;}
        </style>
    </head>

    <body>
        <!--title-->
        <header>
            <h1> Sweet Treats</h1>
        </header>
        <nav style="text-align:center">
            <a class="btn" href="index.html">Home</a> 
            
            <a class="btn" href="Menu.html">Menu</a> 

            <a class="btn" href="">Contact Us</a> 
        </nav>
        
        <form action="submit.html" method="POST">
        <fieldset>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br> 
            <label for="phone">Phone Number:</label><br>
            <input type="text" id="phone" name="phone"><br>
            <label for="email">Email:</label><br>
            <input type="text" id="email" name="email"><br>
        </fieldset><br>

        <fieldset>
            <label for="reason">Reason for Inquiry:</label><br>
            <select id="reason" name="reason">
            <option value="Catering">Catering</option>
            <option value="Rental">Rental Space</option>
            <option value="feedback">Feedback</option>
        </select><br>
        </fieldset> 
        
        <label for="other">Other Inquires</label><br>
        <textarea id="other" name="other"></textarea> 
        
    <fieldset>
        <legend> Have you been to this restaurant?</legend>
        <input type="radio" id="choice1" name="questionnaire" value="yes">
        <label for="choice1">Yes</label>
        <input type="radio" id="choice2" name="questionnaire" value="no">
        <label for="choice2">No</label>
        
        
        <label class="left" for="Days">Best days to contact you:</label>
        <input type="checkbox" id="m" name="Days" value="m">
        <label for="m">M</label>
        <input type="checkbox" id="t" name="Days" value="t">
        <label for="t">T</label>
        <input type="checkbox" id="w" name="Days" value="w">
        <label for="w">W</label>
        <input type="checkbox" id="th" name="Days" value="th">
        <label for="th">Th</label>
        <input type="checkbox" id="f" name="Days" value="f">
        <label for="f">F</label>
    </fieldset>
        <input type="submit" name="submit" value="Submit">
          
        


        <footer>
            <hr />
            <p>12345 Bay Street, Staten Island, NY 10000</p>
            <p>123-456-7890</p>

        </footer>
